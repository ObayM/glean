name: release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm run build:firefox

      - name: package zips
        run: |
          cd .output/chrome-mv3 && zip -r ../../glean.zip . && cd -
          cd .output/firefox-mv2 && zip -r ../../glean-firefox-experimental.zip . && cd -

      - name: read version
        id: v
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: publish release
        run: |
          TAG="v${{ steps.v.outputs.version }}"
          ASSETS="glean.zip glean-firefox-experimental.zip"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" $ASSETS --clobber
          else
            gh release create "$TAG" $ASSETS \
              --title "$TAG" \
              --notes "Automated build from ${{ github.sha }}. Firefox zip is experimental (audio not verified)."
          fi
