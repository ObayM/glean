name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type & Svelte check
        run: npm run check

      - name: Build (Chrome)
        run: npm run build

      - name: Build (Firefox)
        run: npm run build:firefox

      - name: Upload Chrome build
        uses: actions/upload-artifact@v4
        with:
          name: glean-chrome-mv3
          path: .output/chrome-mv3
