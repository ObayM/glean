<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Glean Popup</title>
  <link rel="stylesheet" href="../shared/theme.css">
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">
</head>
<body>
  <svg width="0" height="0" style="position: absolute; pointer-events: none;">
    <defs>
      <filter id="liquid-refraction" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence type="fractalNoise" baseFrequency="0.005" numOctaves="2" result="noise"></feTurbulence>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="15" xChannelSelector="R" yChannelSelector="G" result="displaced"></feDisplacementMap>
        <feSpecularLighting in="noise" specularExponent="30" specularConstant="1.0" lighting-color="#ffffff" result="light">
          <feDistantLight azimuth="225" elevation="55"></feDistantLight>
        </feSpecularLighting>
        <feBlend in="light" in2="displaced" mode="screen"></feBlend>
      </filter>
    </defs>
  </svg>
  <div class="popup-container">
    <header class="header">
      <div class="logo-area">
        <img src="../icons/icon48.png" alt="" class="logo-icon">
        <span class="logo-text">Glean</span>
      </div>
      <button id="btn-settings" class="icon-button" title="Open Settings">
        <i class="fa-solid fa-gear"></i>
      </button>
    </header>

    <main class="main-content">
      <section class="status-card glass-panel">
        <div class="status-row">
          <span class="status-label"><i class="fa-solid fa-plug"></i> Anki Connection</span>
          <div class="status-indicator">
            <span id="connection-dot" class="dot dot-unknown"></span>
            <span id="connection-text">Checking...</span>
          </div>
        </div>
        <div class="status-row">
          <span class="status-label"><i class="fa-solid fa-folder"></i> Target Deck</span>
          <span id="target-deck-name" class="deck-badge">Checking...</span>
        </div>
      </section>

      <section id="stats-card" class="stats-card glass-panel hidden">
        <h3 class="card-title">Today's Activity</h3>
        <div class="stats-grid">
          <div class="stat-box">
            <i class="fa-solid fa-bolt stat-icon"></i>
            <span id="stats-today" class="stat-number">0</span>
            <span class="stat-label">Added Today</span>
          </div>
          <div class="stat-box">
            <i class="fa-solid fa-book stat-icon"></i>
            <span id="stats-total" class="stat-number">0</span>
            <span class="stat-label">Total Added</span>
          </div>
        </div>
      </section>

      <section class="recent-section glass-panel">
        <h3 class="section-title">Recent Snapshots</h3>
        <ul id="recent-list" class="recent-list">
          <li class="empty-message">Highlight 1-3 words on any page to glean your first word.</li>
        </ul>
      </section>

      <section id="setup-prompt" class="setup-prompt glass-panel hidden">
        <div class="setup-icon">
          <i class="fa-solid fa-triangle-exclamation"></i>
        </div>
        <h3>API Key Required</h3>
        <p>You need to enter your Hack Club AI key to use Glean.</p>
        <button id="btn-onboarding" class="primary-button">Setup Now</button>
      </section>
    </main>
  </div>
  <script src="../shared/liquid-glass.js"></script>
  <script src="popup.js"></script>
</body>
</html>
